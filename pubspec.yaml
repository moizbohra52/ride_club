name: ride_club
description: "RideClub — group ride tracking with live location & chat."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- State / DI / routing ---
  get: ^4.6.6
  get_storage: ^2.1.1

  # --- Firebase (Spark plan compatible) ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_database: ^11.1.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.4
  firebase_app_check: ^0.3.1+4

  # --- Auth providers ---
  google_sign_in: ^6.2.1

  # --- Maps / location / routing (used from Phase 3 on) ---
  flutter_map: ^7.0.2
  flutter_map_animations: 0.8.0
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  flutter_compass: ^0.8.1

  # --- Networking (Nominatim / OSRM / Overpass) ---
  http: ^1.2.2

  # --- UI helpers ---
  google_fonts: ^6.2.1
  pin_code_fields: ^8.0.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  battery_plus: ^6.0.3
  permission_handler: ^11.3.1
  share_plus: ^10.0.2
  url_launcher: ^6.3.1
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/ride-club-logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true